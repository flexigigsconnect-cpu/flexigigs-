<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Flexigigs - File to HTML Code Converter">
    <title>Flexigigs | Code Extractor Tool</title>
    
    <link rel="icon" href="https://i.postimg.cc/Vv19gBFx/IMG-20250924-155058.jpg" type="image/jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        /* =========================================
           1. CSS Variables & Theme Configuration
           ========================================= */
        :root {
            --font-primary: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            --font-code: 'Fira Code', monospace;
            --header-height: 85px;
            --container-max: 800px; 
            --container-padding: 0 1.2rem;
            
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-full: 9999px;
            
            --transition-fast: 0.25s cubic-bezier(0.25, 1, 0.5, 1);
            --transition-smooth: 0.5s cubic-bezier(0.22, 1, 0.36, 1);

            --accent-color: #ff6b00; 
            --accent-gradient: linear-gradient(135deg, #ff8a00, #ff3d00);
            --shadow-header: 0 4px 20px rgba(0, 0, 0, 0.04);
            --shadow-card: 0 8px 30px rgba(0,0,0,0.05);
            --shadow-glow: 0 10px 30px -5px rgba(255, 107, 0, 0.3);
        }

        [data-theme="light"] {
            --bg-color: #fcfcfd;
            --surface-color: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --header-bg: rgba(255, 255, 255, 0.85);
            --header-border: rgba(255, 107, 0, 0.1);
            --card-border: rgba(0, 0, 0, 0.08);
            --btn-bg: rgba(255, 107, 0, 0.05);
            --upload-bg: #f8fafc;
            --upload-border: #cbd5e1;
            --terminal-bg: #0f172a;
            --terminal-header: #1e293b;
            --terminal-text: #e2e8f0;
        }

        [data-theme="dark"] {
            --bg-color: #0d0704;
            --surface-color: #1a0f08;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --header-bg: rgba(13, 7, 4, 0.85);
            --header-border: rgba(255, 107, 0, 0.15);
            --card-border: rgba(255, 255, 255, 0.08);
            --btn-bg: rgba(255, 107, 0, 0.1);
            --upload-bg: #140b06;
            --upload-border: rgba(255, 107, 0, 0.3);
            --terminal-bg: #050302;
            --terminal-header: #140b06;
            --terminal-text: #e2e8f0;
        }

        /* =========================================
           2. Base Reset & FOOLPROOF LAYOUT
           ========================================= */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: var(--font-primary); background-color: var(--bg-color); color: var(--text-primary); 
            line-height: 1.6; transition: background-color var(--transition-smooth), color var(--transition-smooth); 
            -webkit-font-smoothing: antialiased; min-height: 100vh;
            background-image: radial-gradient(circle at 15% 10%, rgba(255, 107, 0, 0.05) 0%, transparent 40%), radial-gradient(circle at 85% 90%, rgba(255, 107, 0, 0.04) 0%, transparent 40%);
            background-attachment: fixed;
            
            /* THIS IS THE FIX: Pushes the entire page content down by exactly the header height */
            padding-top: var(--header-height); 
        }

        .container { max-width: var(--container-max); margin: 0 auto; padding: var(--container-padding); }

        /* =========================================
           3. HEADER
           ========================================= */
        .site-header { 
            position: fixed; top: 0; left: 0; width: 100%; height: var(--header-height); 
            background: var(--header-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
            border-bottom: 1px solid var(--header-border); z-index: 1000; transition: all var(--transition-smooth); 
        }
        .site-header.scrolled { box-shadow: var(--shadow-header); }
        .header-inner { display: flex; align-items: center; justify-content: space-between; height: 100%; }
        
        .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--text-primary); font-weight: 800; font-size: 1.25rem; letter-spacing: -0.02em; transition: transform var(--transition-fast);}
        .brand:hover { transform: scale(1.03); }
        .brand-logo-wrapper { width: 38px; height: 38px; border-radius: 10px; overflow: hidden; border: 1px solid var(--header-border); box-shadow: 0 4px 10px rgba(255,107,0,0.1);}
        .brand-logo { width: 100%; height: 100%; object-fit: cover; }

        .icon-btn { background: transparent; border: none; color: var(--text-primary); width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.4rem; transition: all var(--transition-fast); }
        .icon-btn:hover { background: var(--btn-bg); color: var(--accent-color); transform: scale(1.05); }
        
        .icon-light, .icon-dark { display: none; }
        [data-theme="dark"] .icon-light { display: block; }
        [data-theme="light"] .icon-dark { display: block; }

        /* =========================================
           4. HERO & TOOL SECTION
           ========================================= */
        main { 
            /* This adds visual space strictly between the header and the text */
            padding-top: 4rem; 
            padding-bottom: 4rem; 
        } 
        
        .hero-section { 
            text-align: center; margin-bottom: 3.5rem; 
            opacity: 0; transform: translateY(40px); /* Start state for animation */
            animation: slideUpFade 0.8s ease forwards; 
        }
        .hero-section h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
        .hero-section h1 span { background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-section p { font-size: 1.1rem; color: var(--text-secondary); }

        /* Animated Tool Card Wrapper */
        .tool-wrapper {
            position: relative; background: transparent; border-radius: var(--radius-lg); padding: 3px;
            overflow: hidden; box-shadow: var(--shadow-card); 
            opacity: 0; transform: translateY(40px); /* Start state for animation */
            animation: slideUpFade 0.8s ease forwards; animation-delay: 0.1s; 
        }
        
        .tool-wrapper::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent 70%, var(--accent-color) 85%, transparent 100%);
            animation: spin-border 6s linear infinite; z-index: -1; opacity: 0.8;
        }
        @keyframes spin-border { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes slideUpFade { to { opacity: 1; transform: translateY(0); } }

        .tool-inner {
            background: var(--surface-color); border-radius: calc(var(--radius-lg) - 2px);
            padding: 2.5rem; display: flex; flex-direction: column; gap: 2rem;
        }

        /* Drag & Drop Upload Area */
        .upload-area {
            border: 2px dashed var(--upload-border); border-radius: var(--radius-md); padding: 3rem 2rem;
            text-align: center; background-color: var(--upload-bg); cursor: pointer; position: relative;
            transition: all var(--transition-fast); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
        }
        .upload-area:hover, .upload-area.dragover { border-color: var(--accent-color); background-color: var(--btn-bg); }
        .upload-area.dragover { transform: scale(1.02); }
        
        .upload-icon { font-size: 3rem; color: var(--accent-color); margin-bottom: 0.5rem; }
        .upload-text { font-size: 1.2rem; font-weight: 700; color: var(--text-primary); }
        .upload-subtext { font-size: 0.9rem; color: var(--text-secondary); }
        
        .upload-area input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }

        /* Output Terminal Area */
        .output-container { display: none; animation: slideUpFade 0.5s ease forwards; }
        
        .terminal-window {
            border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--card-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .terminal-header {
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;
            background: var(--terminal-header); padding: 0.75rem 1.25rem; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .terminal-info { display: flex; gap: 8px; align-items: center;}
        .mac-dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot-red { background: #ff5f56; } .dot-yellow { background: #ffbd2e; } .dot-green { background: #27c93f; }
        
        .file-name-display { font-family: var(--font-code); font-size: 0.85rem; color: var(--text-tertiary); font-weight: 500; margin-left: 10px;}
        .badge-editable { background: rgba(255, 107, 0, 0.15); color: var(--accent-color); font-size: 0.7rem; font-weight: 700; padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(255, 107, 0, 0.3); margin-left: 8px; text-transform: uppercase;}

        .terminal-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        
        .btn-action {
            border: none; padding: 0.45rem 1rem; border-radius: 8px; font-size: 0.85rem; font-weight: 700; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
            transition: all var(--transition-fast);
        }
        .btn-action:active { transform: scale(0.95); }
        
        .btn-copy { background: var(--accent-gradient); color: white; }
        .btn-copy:hover { transform: translateY(-2px); box-shadow: var(--shadow-glow); }
        
        .btn-clear { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
        .btn-clear:hover { background: #ef4444; color: white; transform: translateY(-2px); }

        .terminal-body {
            background: var(--terminal-bg); padding: 1.5rem; max-height: 500px; overflow-y: auto; overflow-x: auto;
        }
        .terminal-body::-webkit-scrollbar { width: 8px; height: 8px; }
        .terminal-body::-webkit-scrollbar-track { background: var(--terminal-header); }
        .terminal-body::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }

        pre { margin: 0; }
        
        /* Editable Code Area Styling */
        code {
            font-family: var(--font-code); font-size: 0.9rem; line-height: 1.6; color: var(--terminal-text);
            white-space: pre-wrap; word-break: break-all; outline: none; display: block; min-height: 20px;
            transition: background var(--transition-fast);
        }
        
        /* Highlight background slightly when user clicks to edit */
        code[contenteditable="true"]:focus {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            /* Shrink header slightly on mobile */
            :root { --header-height: 70px; --container-padding: 0 1rem; }
            main { padding-top: 3rem; } /* Mobile visual breathing room */
            .hero-section h1 { font-size: 2.1rem; }
            .tool-inner { padding: 1.5rem; }
            .upload-area { padding: 2rem 1rem; }
            .terminal-actions { width: 100%; display: grid; grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="site-header" id="header">
        <div class="container header-inner">
            <a href="#" class="brand" aria-label="Flexigigs DevTools">
                <div class="brand-logo-wrapper">
                    <img src="https://i.postimg.cc/Vv19gBFx/IMG-20250924-155058.jpg" alt="Flexigigs Logo" class="brand-logo">
                </div>
                <span>DevTools</span>
            </a>
            <div class="header-controls">
                <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme">
                    <i class="ph-bold ph-sun icon-light"></i>
                    <i class="ph-bold ph-moon icon-dark"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <div class="hero-section">
            <h1>Source Code <span>Extractor</span></h1>
            <p>Upload a file to extract its source code. You can freely type, edit, or delete the code directly in the terminal below before copying it.</p>
        </div>

        <div class="tool-wrapper">
            <div class="tool-inner">
                
                <!-- Upload Dropzone -->
                <div class="upload-area" id="dropZone">
                    <i class="ph-bold ph-file-code upload-icon"></i>
                    <div class="upload-text">Drag & Drop your file here</div>
                    <div class="upload-subtext">or click to browse from your device</div>
                    <div style="margin-top: 10px; font-size: 0.8rem; font-weight: 600; color: var(--accent-color);">
                        Supports .html, .css, .js, .txt, .xml, .md
                    </div>
                    <input type="file" id="fileInput" accept=".html,.txt,.md,.js,.css,.xml,.json,.php,.py">
                </div>

                <!-- Terminal Output (Fully Editable) -->
                <div class="output-container" id="outputContainer">
                    <div class="terminal-window">
                        <div class="terminal-header">
                            <div class="terminal-info">
                                <div class="mac-dot dot-red"></div>
                                <div class="mac-dot dot-yellow"></div>
                                <div class="mac-dot dot-green"></div>
                                <span class="file-name-display" id="fileName">code.html</span>
                                <span class="badge-editable">Editable</span>
                            </div>
                            <div class="terminal-actions">
                                <button class="btn-action btn-clear" id="clearBtn" onclick="clearCode()">
                                    <i class="ph-bold ph-trash"></i> Clear
                                </button>
                                <button class="btn-action btn-copy" id="copyBtn" onclick="copyCode()">
                                    <i class="ph-bold ph-copy"></i> Copy Code
                                </button>
                            </div>
                        </div>
                        <div class="terminal-body">
                            <!-- contenteditable allows direct typing/deleting inside the terminal -->
                            <pre><code id="codeOutput" contenteditable="true" spellcheck="false"></code></pre>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // --- Theme Management ---
            const themeToggle = document.getElementById('theme-toggle');
            const htmlElement = document.documentElement;
            const header = document.getElementById('header');
            
            if (localStorage.getItem('theme')) {
                htmlElement.setAttribute('data-theme', localStorage.getItem('theme'));
            }

            themeToggle.addEventListener('click', () => {
                const targetTheme = htmlElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                htmlElement.setAttribute('data-theme', targetTheme);
                localStorage.setItem('theme', targetTheme);
            });

            window.addEventListener('scroll', () => {
                if (window.scrollY > 10) header.classList.add('scrolled');
                else header.classList.remove('scrolled');
            });

            // --- File Extraction Logic ---
            const fileInput = document.getElementById('fileInput');
            const dropZone = document.getElementById('dropZone');
            const codeOutput = document.getElementById('codeOutput');
            const outputContainer = document.getElementById('outputContainer');
            const fileNameDisplay = document.getElementById('fileName');
            const copyBtn = document.getElementById('copyBtn');

            // Drag and drop UX enhancements
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, preventDefaults, false);
            });

            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }

            ['dragenter', 'dragover'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
            });

            ['dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
            });

            dropZone.addEventListener('drop', (e) => {
                const dt = e.dataTransfer;
                const files = dt.files;
                if (files.length) {
                    fileInput.files = files; 
                    processFile(files[0]);
                }
            });

            fileInput.addEventListener('change', function(event) {
                if (event.target.files.length) {
                    processFile(event.target.files[0]);
                }
            });

            function processFile(file) {
                if (!file) return;

                const reader = new FileReader();
                
                reader.onload = function(e) {
                    // Inject raw text into the editable block
                    codeOutput.textContent = e.target.result;
                    fileNameDisplay.textContent = file.name;
                    outputContainer.style.display = 'block';
                    
                    // Reset copy button state
                    copyBtn.innerHTML = '<i class="ph-bold ph-copy"></i> Copy Code';
                    copyBtn.style.background = 'var(--accent-gradient)';
                    
                    // Smooth scroll to output
                    setTimeout(() => {
                        outputContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 100);
                };
                
                reader.readAsText(file);
            }

            // --- Global Functions (Copy & Clear) ---
            
            // Clear Code Editor
            window.clearCode = function() {
                codeOutput.textContent = '';
                fileInput.value = ''; // Reset the file input so the same file can be uploaded again
                outputContainer.style.display = 'none';
            };

            // Copy Extracted/Edited Code
            window.copyCode = function() {
                // innerText is used here to respect the line breaks modified by the user in contenteditable mode
                const codeText = codeOutput.innerText;
                
                if(!codeText) return;

                navigator.clipboard.writeText(codeText).then(() => {
                    copyBtn.innerHTML = '<i class="ph-bold ph-check"></i> Copied!';
                    copyBtn.style.background = '#10b981'; 
                    
                    setTimeout(() => {
                        copyBtn.innerHTML = '<i class="ph-bold ph-copy"></i> Copy Code';
                        copyBtn.style.background = 'var(--accent-gradient)';
                    }, 2500);
                }).catch(err => {
                    console.error('Clipboard Error: ', err);
                    alert('Failed to copy. Your browser may not support this feature.');
                });
            };
        });
    </script>
</body>
</html>
