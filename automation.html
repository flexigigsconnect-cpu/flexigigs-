<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Flexigigs | AI Automation</title>
    
    <link rel="icon" href="https://i.postimg.cc/Vv19gBFx/IMG-20250924-155058.jpg" type="image/jpeg">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        /* =========================================
           1. CSS Variables & Theme Configuration
           ========================================= */
        :root {
            --font-primary: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            --header-height: 88px;
            --container-max: 1100px;
            --container-padding: 0 1.5rem;
            --radius-md: 16px;
            --radius-full: 9999px;
            
            --transition-fast: 0.25s cubic-bezier(0.25, 1, 0.5, 1);
            --transition-smooth: 0.5s cubic-bezier(0.4, 0, 0.2, 1);

            --accent-color: #ff6b00; 
            --accent-gradient: linear-gradient(135deg, #ff8a00, #e52e71);
            
            --shadow-header: 0 4px 40px rgba(0, 0, 0, 0.03);
            --shadow-hover: 0 20px 40px rgba(255, 107, 0, 0.15);
        }

        /* Light Theme Variables */
        [data-theme="light"] {
            --bg-color: #fcfcfd;
            --surface-color: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --header-bg: rgba(255, 255, 255, 0.75);
            --header-border: rgba(15, 23, 42, 0.08);
            --btn-hover-bg: rgba(15, 23, 42, 0.04);
        }

        /* Dark Theme Variables */
        [data-theme="dark"] {
            --bg-color: #050810;
            --surface-color: #0f1422;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --header-bg: rgba(5, 8, 16, 0.75);
            --header-border: rgba(255, 255, 255, 0.08);
            --btn-hover-bg: rgba(255, 255, 255, 0.08);
        }

        /* =========================================
           2. Base Reset & Ambient Background
           ========================================= */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: var(--font-primary); 
            background-color: var(--bg-color); 
            background-image: radial-gradient(circle at 50% 0%, rgba(255, 107, 0, 0.04) 0%, transparent 70%);
            background-attachment: fixed;
            color: var(--text-primary); 
            line-height: 1.6; 
            transition: background-color var(--transition-smooth), color var(--transition-smooth); 
            -webkit-font-smoothing: antialiased; 
            padding-top: var(--header-height);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* =========================================
           3. Premium Glassmorphism Header
           ========================================= */
        .site-header { 
            position: fixed; top: 0; left: 0; width: 100%; height: var(--header-height); 
            background: var(--header-bg); 
            backdrop-filter: blur(24px) saturate(180%); 
            -webkit-backdrop-filter: blur(24px) saturate(180%); 
            border-bottom: 1px solid var(--header-border); 
            z-index: 1000; 
            transition: all var(--transition-smooth); 
        }
        
        .header-inner { display: flex; align-items: center; justify-content: space-between; height: 100%; padding: var(--container-padding); max-width: var(--container-max); margin: 0 auto; }
        
        .brand { display: flex; align-items: center; gap: 14px; text-decoration: none; color: var(--text-primary); transition: transform var(--transition-fast); }
        .brand:hover { transform: scale(1.02); }
        .brand-logo-wrapper { width: 44px; height: 44px; border-radius: var(--radius-md); overflow: hidden; display: flex; align-items: center; justify-content: center; background: var(--surface-color); border: 1px solid var(--header-border); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .brand-logo { width: 100%; height: 100%; object-fit: cover; }
        .brand-name { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.02em; }

        .icon-btn { background: transparent; border: none; color: var(--text-primary); width: 44px; height: 44px; border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.5rem; transition: background-color var(--transition-fast), transform var(--transition-fast); }
        .icon-btn:hover { background-color: var(--btn-hover-bg); transform: scale(1.05); }
        .icon-light, .icon-dark { display: none; }
        [data-theme="dark"] .icon-light { display: block; }
        [data-theme="light"] .icon-dark { display: block; }

        /* =========================================
           4. Buttons
           ========================================= */
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 1rem 2.2rem; border-radius: var(--radius-full); font-size: 1.05rem; font-weight: 700; cursor: pointer; border: none; transition: all var(--transition-fast); text-decoration: none; }
        .btn-primary { background: var(--accent-gradient); color: white; box-shadow: 0 8px 20px -5px rgba(255, 107, 0, 0.4); }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }

        /* =========================================
           5. Waitlist / Coming Soon Section
           ========================================= */
        .coming-soon-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem var(--container-padding);
            text-align: center;
        }

        .icon-wrapper {
            font-size: 4rem;
            color: var(--accent-color);
            margin-bottom: 1.5rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 1rem;
            letter-spacing: -0.03em;
        }

        .text-gradient { 
            background: var(--accent-gradient); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        p {
            font-size: 1.2rem;
            color: var(--text-secondary);
            max-width: 500px;
            margin: 0 auto 2.5rem auto;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="site-header" id="header">
        <div class="header-inner">
            <a href="#" class="brand">
                <div class="brand-logo-wrapper">
                    <img src="https://i.postimg.cc/Vv19gBFx/IMG-20250924-155058.jpg" alt="Flexigigs Logo" class="brand-logo">
                </div>
                <span class="brand-name">Flexigigs</span>
            </a>
            <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme">
                <i class="ph ph-sun icon-light"></i>
                <i class="ph ph-moon icon-dark"></i>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="coming-soon-wrapper">
        <div class="icon-wrapper">
            <i class="ph-duotone ph-robot"></i>
        </div>
        <h1>AI Automation <br><span class="text-gradient">Coming Soon</span></h1>
        <p>This feature is not available at the moment. We are working hard to bring you powerful AI tools.</p>
        
        <button class="btn btn-primary" id="notify-btn">
            Notify Me When Launched <i class="ph-bold ph-bell"></i>
        </button>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // --- Theme Logic ---
            const themeToggle = document.getElementById('theme-toggle');
            const htmlElement = document.documentElement;
            const savedTheme = localStorage.getItem('theme');
            
            // Apply saved theme on load
            if (savedTheme) {
                htmlElement.setAttribute('data-theme', savedTheme);
            } else {
                htmlElement.setAttribute('data-theme', 'light');
            }

            // Toggle theme on button click
            themeToggle.addEventListener('click', () => {
                const newTheme = htmlElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                htmlElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
            });

            // --- Notify Button Logic ---
            const notifyBtn = document.getElementById('notify-btn');
            notifyBtn.addEventListener('click', () => {
                // Placeholder action: Replace this with your actual form/modal/API call
                alert("Thank you! We will notify you as soon as our AI Automation features are launched.");
            });

        });
    </script>
</body>
</html>
